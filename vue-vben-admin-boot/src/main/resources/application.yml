server:
  port: 9000
  servlet:
    context-path: /api

# JWT：accessToken 过期时间
jwt:
  # secret 密钥，用于签名和验证 JWT 令牌,除开发外，不要写到这里面
  secret: "vue-vben-demo-jwt-secret-key-at-least-32-bytes-long!!"
  access-expiration-ms: 604800000
  # RefreshToken 过期时间
  refresh-expiration-ms: 2592000000

# 活跃记录窗口（仅用于 Redis 活跃记录与后续策略扩展；当前不作为强制下线条件）
app:
  session:
    idle-timeout-ms: 2592000000

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      timeout: 3s
  datasource:
    url: jdbc:mysql://localhost:3307/vben_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
#  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#
#logging:
#  level:
#    com.boot.vuevbenadminboot.mapper: debug
#上面的注释用于打开日志，方便调试
